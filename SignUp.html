<!DOCTYPE html>
<html lang="en">
    <head>

    <body class="page_background">

        <div class="box main_backgrounde links">

            <a href ="ContactUs.html">Contact Us</a>

            <h1 class="header background_centered">Sign Up</h1>

        </div>

        <div class="floatinglinks_container" style="grid-template-columns: auto auto;">
                <div class="heading_text no_margin_no_padding" style="height: 680px;">
                    <form>
                        <label for="fname">First Name</label><br>
                        <input type="text" id="fname" name="fname"><br><br>

                        <hr>

                        <label for="lname">Last Name</label><br>
                        <input type="text" id="lname" name="lname"><br><br>

                        <hr>

                        Grade<br><br>

                        <input type="radio" id="grade7" name="sgrade">
                        <label for="grade7">Grade 7</label><br>
                            
                        <input type="radio" id="grade8" name="sgrade">
                        <label for="grade8">Grade 8</label><br>

                        <label for="age">Age</label><br>

                        <hr>

                        <input type="radio" id="beginner" name="knowledge">
                        <label for="beginner">Beginner</label><br>
                            
                        <input type="radio" id="intermediate" name="knowledge">

                        <input type="radio" id="advanced" name="knowledge">

                </div>
        </div>
